name: Maintainer Intake
on:
  pull_request:
    types: [opened, edited, reopened, synchronize, ready_for_review]
  issues:
    types: [opened, edited, reopened]
permissions:
  contents: read
  pull-requests: read
  issues: read
jobs:
  intake:
    runs-on: ubuntu-latest
    steps:
      - uses: joseph-217/maintainer-intake@v0
        with:
          mode: advisory
          comment: false
          labels: false
