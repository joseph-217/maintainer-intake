name: Publish npm

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Annotated version tag to publish, such as v0.1.2
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Verify tagged package and publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tagged release
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          ref: ${{ inputs.release_tag }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Verify release identity
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          version=$(node -p "require('./package.json').version")
          test "$RELEASE_TAG" = "v$version"
          test "$(git rev-parse HEAD)" = "$(git rev-parse "$RELEASE_TAG^{commit}")"
          major_tag="v${version%%.*}"
          test "$(git rev-parse "$major_tag^{commit}")" = "$(git rev-parse HEAD)"
          test -z "$(git status --porcelain)"

      - name: Install
        run: npm ci

      - name: Verify
        run: npm run verify

      - name: Publish through npm trusted publishing
        run: npm publish --access public
